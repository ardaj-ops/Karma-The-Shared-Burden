<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karma: The Shared Burden</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>Karma: The Shared Burden</h1>
    
    <div style="background: #e74c3c; padding: 10px; margin: 10px; border-radius: 5px; width: 80%; margin: 10px auto;">
        <h2 style="margin: 0;">Boss HP: <span id="enemy-hp">100</span></h2>
    </div>
    
    <div style="display: flex; justify-content: space-around; background: #2c3e50; color: white; padding: 10px; border-radius: 5px; width: 80%; margin: 10px auto;">
        <div id="karma-bar">Společná Karma: <span id="karma-value">0</span></div>
        <div id="mana-bar">Tvoje Mana: <span id="mana-value">0</span> / 3</div>
    </div>
    
    <h2>Tvoje ruka</h2>
    
    <div id="hand-container" style="display: flex; gap: 10px; padding: 10px; justify-content: center; min-height: 120px; background: #ecf0f1; border-radius: 5px;">
        </div>

    <h3>Herní log:</h3>
    <ul id="log"></ul>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
