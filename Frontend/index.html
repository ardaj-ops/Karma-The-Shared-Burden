<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karma: The Shared Burden</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1 style="text-align: center;">Karma: The Shared Burden</h1>
    
    <div id="lobby-screen" style="width: 80%; margin: 20px auto; text-align: center; background: #ecf0f1; padding: 30px; border-radius: 10px;">
            <h2>Vítej hrdino!</h2>
            <p>Zadej své jméno a vyber si třídu:</p>
            
            <input type="text" id="player-name-input" placeholder="Tvé jméno..." style="padding: 10px; font-size: 16px; margin-bottom: 20px; width: 50%;">
            
            <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px;">
                <button onclick="selectCharacter('Paladin')" style="padding: 15px; font-size: 16px; background: #f1c40f; color: black; border: none; border-radius: 5px; cursor: pointer;">🛡️ Paladin</button>
                <button onclick="selectCharacter('Warlock')" style="padding: 15px; font-size: 16px; background: #8e44ad; color: white; border: none; border-radius: 5px; cursor: pointer;">💀 Warlock</button>
                <button onclick="selectCharacter('Monk')" style="padding: 15px; font-size: 16px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer;">📿 Monk</button>
                <button onclick="selectCharacter('Berserker')" style="padding: 15px; font-size: 16px; background: #c0392b; color: white; border: none; border-radius: 5px; cursor: pointer;">🪓 Berserker</button>
                <button onclick="selectCharacter('Druid')" style="padding: 15px; font-size: 16px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer;">🌿 Druid</button>
                <button onclick="selectCharacter('Rogue')" style="padding: 15px; font-size: 16px; background: #2c3e50; color: white; border: none; border-radius: 5px; cursor: pointer;">🗡️ Rogue</button>
                <button onclick="selectCharacter('Bard')" style="padding: 15px; font-size: 16px; background: #e67e22; color: white; border: none; border-radius: 5px; cursor: pointer;">🎵 Bard</button>
                <button onclick="selectCharacter('Pyromancer')" style="padding: 15px; font-size: 16px; background: #d35400; color: white; border: none; border-radius: 5px; cursor: pointer;">🔥 Pyromancer</button>
            </div>
        </div>

    <div id="game-screen" style="display: none;">
        
        <div id="battle-hud">
            <div style="background: #e74c3c; padding: 10px; margin: 10px; border-radius: 5px; width: 80%; margin: 10px auto; text-align: center; color: white;">
                <h2 style="margin: 0;">Boss HP: <span id="enemy-hp">100</span></h2>
            </div>
            
            <div style="display: flex; justify-content: space-around; background: #2c3e50; color: white; padding: 10px; border-radius: 5px; width: 80%; margin: 10px auto;">
                <div id="karma-bar">Společná Karma: <span id="karma-value">0</span></div>
                <div id="mana-bar">Tvoje Mana: <span id="mana-value">0</span> / 3</div>
            </div>
        </div>

        <div id="map-container" style="display: none; background: #34495e; color: white; padding: 20px; border-radius: 5px; margin: 20px auto; width: 80%; text-align: center;">
            <h2>Mapa postupu</h2>
            <div id="nodes-list" style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-top: 15px;"></div>
        </div>
        
        <div id="hand-wrapper" style="width: 80%; margin: 20px auto; text-align: center;">
            <h2 id="hand-title">Tvoje ruka</h2>
            <div id="hand-container" style="display: flex; gap: 10px; padding: 15px; justify-content: center; min-height: 120px; background: #ecf0f1; border-radius: 5px;"></div>
        </div>

        <div style="width: 80%; margin: 20px auto;">
            <h3>Herní log:</h3>
            <ul id="log" style="background: #f9f9f9; padding: 15px; border-radius: 5px; border: 1px solid #ddd; max-height: 200px; overflow-y: auto;"></ul>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
